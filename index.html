<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .section-title {
            color: #333;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .weight {
            color: #764ba2;
            font-size: 12px;
            font-weight: normal;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="number"]:disabled {
            background: #f0f0f0;
            color: #999;
            cursor: not-allowed;
        }

        .auto-calculated {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        .auto-calculated .value {
            color: #667eea;
            font-size: 20px;
        }

        .toggle-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: white;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-option:hover {
            background: #f8f9fa;
        }

        .toggle-option input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .toggle-option label {
            margin: 0;
            cursor: pointer;
            font-size: 13px;
            color: #666;
        }

        .exam-score-section {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .exam-score-title {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .exam-score-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .calculate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .calculate-btn:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 30px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s ease;
        }

        .results.show {
            opacity: 1;
            transform: scale(1);
        }

        .result-card {
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 15px;
        }

        .final-result {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .result-label {
            color: white;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .result-score {
            color: white;
            font-size: 42px;
            font-weight: bold;
        }

        .breakdown {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .breakdown-item:last-child {
            margin-bottom: 0;
            padding-top: 8px;
            border-top: 2px solid #ddd;
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Grade Calculator</h1>
        <p class="subtitle">Calculate your exam score and final grade</p>
        
        <form id="gradeForm">
            <div class="section">
                <div class="section-title">📝 Exam Scores</div>
                
                <div class="input-group">
                    <label for="written">Written Portion <span class="weight">(60%)</span></label>
                    <input type="number" id="written" step="0.01" placeholder="Enter score">
                </div>

                <div class="input-group">
                    <label for="multipleChoice">Multiple Choice <span class="weight">(40%)</span></label>
                    <input type="number" id="multipleChoice" step="0.01" placeholder="Enter score">
                </div>

                <div class="toggle-option">
                    <input type="checkbox" id="manualExamToggle">
                    <label for="manualExamToggle">Enter exam score manually (for classes without 60/40 split)</label>
                </div>
            </div>

            <div class="exam-score-section">
                <div class="exam-score-title">Total Exam Score</div>
                <div class="exam-score-value" id="examScoreDisplay">--</div>
                <div class="input-group" id="manualExamInput" style="display: none; margin-top: 15px;">
                    <label for="manualExam">Enter Exam Score Manually</label>
                    <input type="number" id="manualExam" step="0.01" placeholder="Enter exam score">
                </div>
            </div>

            <div class="section">
                <div class="section-title">📚 Quarter Grades</div>
                
                <div class="input-group">
                    <label for="quarter3">Quarter 3 Grade <span class="weight">(40%)</span></label>
                    <input type="number" id="quarter3" step="0.01" placeholder="Enter grade" required>
                </div>

                <div class="input-group">
                    <label for="quarter4">Quarter 4 Grade <span class="weight">(40%)</span></label>
                    <input type="number" id="quarter4" step="0.01" placeholder="Enter grade" required>
                </div>
            </div>

            <button type="submit" class="calculate-btn">Calculate Final Grade</button>
        </form>

        <div class="results" id="results">
            <div class="result-card final-result">
                <div class="result-label">Final Course Grade</div>
                <div class="result-score" id="finalGrade">0</div>
                <div class="breakdown">
                    <div class="breakdown-item">
                        <span>Quarter 3 (40%):</span>
                        <span id="q3Calc">0</span>
                    </div>
                    <div class="breakdown-item">
                        <span>Quarter 4 (40%):</span>
                        <span id="q4Calc">0</span>
                    </div>
                    <div class="breakdown-item">
                        <span>Exam (20%):</span>
                        <span id="examCalc">0</span>
                    </div>
                    <div class="breakdown-item">
                        <span>Final Grade:</span>
                        <span id="finalTotal">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('gradeForm');
        const resultsDiv = document.getElementById('results');
        
        const inputs = {
            written: document.getElementById('written'),
            multipleChoice: document.getElementById('multipleChoice'),
            quarter3: document.getElementById('quarter3'),
            quarter4: document.getElementById('quarter4'),
            manualExam: document.getElementById('manualExam')
        };

        const examScoreDisplay = document.getElementById('examScoreDisplay');
        const manualExamToggle = document.getElementById('manualExamToggle');
        const manualExamInput = document.getElementById('manualExamInput');
        let currentExamScore = null;
        let isManualMode = false;

        // Toggle between auto and manual exam score entry
        manualExamToggle.addEventListener('change', function() {
            isManualMode = this.checked;
            
            if (isManualMode) {
                // Show manual input, disable auto inputs
                manualExamInput.style.display = 'block';
                inputs.written.disabled = true;
                inputs.multipleChoice.disabled = true;
                inputs.written.value = '';
                inputs.multipleChoice.value = '';
                
                // Update from manual input if it has a value
                updateExamScoreFromManual();
            } else {
                // Hide manual input, enable auto inputs
                manualExamInput.style.display = 'none';
                inputs.written.disabled = false;
                inputs.multipleChoice.disabled = false;
                inputs.manualExam.value = '';
                
                // Update from auto calculation
                updateExamScore();
            }
        });

        // Auto-calculate exam score when written or MC changes
        function updateExamScore() {
            if (isManualMode) return;
            
            const written = parseFloat(inputs.written.value);
            const mc = parseFloat(inputs.multipleChoice.value);

            if (!isNaN(written) && !isNaN(mc)) {
                currentExamScore = (written * 0.6) + (mc * 0.4);
                examScoreDisplay.textContent = currentExamScore.toFixed(2);
            } else {
                examScoreDisplay.textContent = '--';
                currentExamScore = null;
            }
        }

        // Update exam score from manual input
        function updateExamScoreFromManual() {
            if (!isManualMode) return;
            
            const manual = parseFloat(inputs.manualExam.value);
            
            if (!isNaN(manual)) {
                currentExamScore = manual;
                examScoreDisplay.textContent = currentExamScore.toFixed(2);
            } else {
                examScoreDisplay.textContent = '--';
                currentExamScore = null;
            }
        }

        inputs.written.addEventListener('input', updateExamScore);
        inputs.multipleChoice.addEventListener('input', updateExamScore);
        inputs.manualExam.addEventListener('input', updateExamScoreFromManual);

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const q3 = parseFloat(inputs.quarter3.value);
            const q4 = parseFloat(inputs.quarter4.value);

            if (isNaN(q3) || isNaN(q4)) {
                alert('Please enter valid numbers for Quarter 3 and Quarter 4');
                return;
            }

            if (currentExamScore === null) {
                if (isManualMode) {
                    alert('Please enter your exam score');
                } else {
                    alert('Please enter both exam scores (Written and Multiple Choice)');
                }
                return;
            }

            // Calculate final grade (Q3 40% + Q4 40% + Exam 20%)
            const finalGrade = (q3 * 0.4) + (q4 * 0.4) + (currentExamScore * 0.2);

            // Update final grade breakdown
            document.getElementById('q3Calc').textContent = (q3 * 0.4).toFixed(2);
            document.getElementById('q4Calc').textContent = (q4 * 0.4).toFixed(2);
            document.getElementById('examCalc').textContent = (currentExamScore * 0.2).toFixed(2);
            document.getElementById('finalTotal').textContent = finalGrade.toFixed(2);
            document.getElementById('finalGrade').textContent = finalGrade.toFixed(2);

            resultsDiv.classList.add('show');
        });

        // Hide results when inputs change
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', function() {
                resultsDiv.classList.remove('show');
            });
        });
    </script>
</body>
</html>
